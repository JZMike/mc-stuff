<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0a0d13" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MikeCockpit" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <title>MikeCockpit</title>
</head>
<body>
  <div class="ptr" id="ptr" aria-hidden="true">↻</div>
  <header class="appbar">
    <div class="appbar-row">
      <div class="brand">
        <div class="logo" aria-hidden="true">🎛️</div>
        <div>
          <h1>MikeCockpit</h1>
          <div class="sub" id="hostSub">MikeServer</div>
        </div>
      </div>
      <div class="spacer"></div>
      <div style="text-align:right">
        <div class="row" style="justify-content:flex-end;gap:7px">
          <span class="statusdot" id="statusDot"></span>
          <span class="muted" id="statusText" style="font-size:12px">online</span>
        </div>
        <div class="sync" id="syncText">a ligar…</div>
      </div>
    </div>
  </header>

  <main>
    <!-- ░░ HOME (vista por defeito) ░░ -->
    <section class="view active" id="view-home" role="tabpanel" aria-label="Home">
      <div id="installBanner"></div>
      <div id="heroHealth"><div class="skeleton" style="height:76px"></div></div>
      <div id="attention"></div>
      <div class="grid grid-3" id="gauges" style="margin-top:12px"></div>
      <div id="mapPreview" style="margin-top:12px"></div>
      <div id="facts" style="margin-top:12px"></div>
    </section>

    <!-- ░░ INFRA (Docker · Apps · Mapa) ░░ -->
    <section class="view" id="view-infra" role="tabpanel" aria-label="Infraestrutura">
      <div class="seg" id="infraSeg" role="tablist" aria-label="Secções de infraestrutura">
        <button data-seg="docker" role="tab" aria-selected="true">Docker</button>
        <button data-seg="apps" role="tab" aria-selected="false">Apps</button>
        <button data-seg="map" role="tab" aria-selected="false">Mapa</button>
      </div>
      <div id="infraDocker">
        <div class="list" id="containerList"><div class="skeleton" style="height:60px"></div></div>
      </div>
      <div id="infraApps" hidden>
        <div class="list" id="appList"><div class="skeleton" style="height:60px"></div></div>
      </div>
    </section>

    <!-- ░░ SISTEMA ░░ -->
    <section class="view" id="view-system" role="tabpanel" aria-label="Sistema">
      <details class="acc" open>
        <summary>Sistema &amp; Host</summary>
        <div id="hostCard"></div>
      </details>
      <details class="acc">
        <summary>Tailscale &amp; acesso</summary>
        <div id="tailscaleCard"></div>
      </details>
      <details class="acc">
        <summary>Backups &amp; fonte da verdade</summary>
        <div id="backupsCard"></div>
      </details>
      <details class="acc">
        <summary>Processos</summary>
        <div class="card" style="padding:12px">
          <div class="btn-row" style="margin-bottom:10px">
            <button class="btn" id="procCpu" style="flex:1">Por CPU</button>
            <button class="btn" id="procMem" style="flex:1">Por RAM</button>
          </div>
          <div id="procList"></div>
        </div>
      </details>
      <details class="acc">
        <summary>Energia</summary>
        <div class="card">
          <div class="row between">
            <div>
              <div style="font-weight:650">Reiniciar a VM Debian</div>
              <div class="dim" style="font-size:12.5px;margin-top:2px">Reboot do SO. Sobe sozinho (Docker unless-stopped).</div>
            </div>
          </div>
          <button class="btn danger block" id="rebootBtn" style="margin-top:14px">⏻ Reiniciar VM…</button>
        </div>
      </details>
    </section>

    <!-- ░░ AUTOMAÇÃO (Comandos + Sessões Claude) ░░ -->
    <section class="view" id="view-auto" role="tabpanel" aria-label="Automação">
      <div class="view-title">Comandos rápidos</div>
      <div id="cmdHint"></div>
      <div class="list" id="cmdList"><div class="skeleton" style="height:60px"></div></div>
      <div class="view-title" style="margin-top:22px">Sessões Claude (tmux)</div>
      <div class="btn-row" style="margin-bottom:14px">
        <button class="btn" id="claudeRefresh" style="flex:1">↻ Atualizar estados</button>
        <button class="btn" id="claudeList" style="flex:1">📋 Sessões ativas</button>
      </div>
      <div id="claudeListOut"></div>
      <div class="list" id="claudeProjects"><div class="skeleton" style="height:84px"></div></div>
    </section>

    <!-- ░░ ALERTAS ░░ -->
    <section class="view" id="view-alerts" role="tabpanel" aria-label="Alertas">
      <div class="view-title">Alertas &amp; Push</div>
      <div id="alertConfig"></div>
      <div class="view-title" style="margin-top:18px">Histórico</div>
      <div class="list" id="alertHistory"></div>
    </section>
  </main>

  <nav class="tabbar" id="tabbar" role="tablist" aria-label="Navegação principal">
    <button class="tab active" data-view="home" role="tab" aria-selected="true" aria-label="Home">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 11l8-7 8 7"/><path d="M6 10v9h12v-9"/><path d="M10 19v-5h4v5"/></svg>Home
    </button>
    <button class="tab" data-view="infra" role="tab" aria-selected="false" aria-label="Infraestrutura">
      <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="16" height="7" rx="1.5"/><rect x="4" y="13" width="16" height="7" rx="1.5"/><path d="M7.5 7.5h0M7.5 16.5h0"/></svg>Infra
    </button>
    <button class="tab" data-view="system" role="tab" aria-selected="false" aria-label="Sistema">
      <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2"/></svg>Sistema
    </button>
    <button class="tab" data-view="auto" role="tab" aria-selected="false" aria-label="Automação">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5l6 7-6 7M12 19h8"/></svg>Automação
    </button>
    <button class="tab" data-view="alerts" role="tab" aria-selected="false" aria-label="Alertas">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"/></svg>Alertas
    </button>
  </nav>

  <!-- ░░ MAPA ORBITAL (Infra → Mapa) ░░ -->
  <div class="mapview" id="mapView" role="region" aria-label="Mapa do servidor">
    <svg id="mapSvg"></svg>
    <div class="map-legend">
      <span class="map-title" id="mapTitle"></span>
      <span class="map-sub" id="mapSub">a carregar…</span>
      <span><span class="d" style="background:var(--ok)"></span>ativo</span>
      <span><span class="d" style="background:var(--crit)"></span>em baixo</span>
    </div>
    <div class="map-zoom">
      <button class="map-btn" id="mapZoomIn" aria-label="Aproximar">＋</button>
      <button class="map-btn" id="mapZoomOut" aria-label="Afastar">－</button>
      <button class="map-btn" id="mapReset" aria-label="Repor vista">⟲</button>
    </div>
  </div>

  <div class="scrim" id="scrim"></div>
  <div class="sheet" id="sheet" role="dialog" aria-modal="true"></div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
